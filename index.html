<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春野鏡子殺人事件　報告メール</title>
<style>
body {
  margin:0;
  height:100vh;
  background:#e9eef3;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:14px;
}

.app { width:100%; max-width:760px; }

.mail {
  background:white;
  border-radius:12px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  overflow:hidden;
  transition:0.6s;
}

.mail.sending { transform:translateY(-18px); opacity:0.45; }

.header { background:#2f3542; color:white; padding:14px 18px; font-weight:bold; }
.row { display:flex; padding:12px 18px; border-bottom:1px solid #ddd; }
.label { width:80px; color:#777; }

textarea {
  width:100%; height:300px; padding:22px; font-size:16px; line-height:1.7;
  border:none; resize:none; outline:none; font-family:inherit; background:white; box-sizing:border-box;
}

.footer { background:#f1f2f6; padding:14px 18px; text-align:right; }

button {
  background:#494B9D; color:white; border:none; border-radius:6px; padding:10px 28px; font-size:15px; cursor:pointer;
}

button:disabled { background:#999; cursor:not-allowed; opacity:0.5; }

.status { display:none; margin-top:16px; text-align:center; color:#555; }

.notification {
  display:none; margin-top:20px; background:white; padding:16px 18px; border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12); cursor:pointer; animation:fadeIn 0.5s;
}

.reply {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:90%; max-width:600px; background:white; color:#222; border-radius:12px; padding:24px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3); z-index:1000;
}

.reply-title { font-weight:bold; margin-bottom:18px; line-height:1.6; border-bottom:1px solid #ddd; padding-bottom:12px; }
#replyText { line-height:1.8; }

.closeBtn { position:absolute; top:12px; right:16px; background:none; border:none; color:#666; font-size:24px; cursor:pointer; padding:0; width:auto; }
.closeBtn:hover { color:#000; }

.xPostBtn { display:none; margin:26px auto 0 auto; background:#000; color:white; border:none; border-radius:8px; padding:10px 22px; font-size:14px; cursor:pointer; animation:xButtonIn 0.6s ease; }
.xPostBtn:hover { opacity:0.8; }

.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.45); z-index:999; }

footer {
  margin-top:24px; font-size:12px; color:#555; text-align:center; width:100%;
}

@keyframes fadeIn { from {opacity:0; transform:translateY(12px);} to {opacity:1; transform:translateY(0);} }
@keyframes xButtonIn { from {opacity:0; transform:translateY(12px);} to {opacity:1; transform:translateY(0);} }

@media(max-width:600px){
  body{align-items:flex-start;}
  .row{padding:12px 16px}
  textarea{height:330px;padding:16px;font-size:15px}
  button{width:100%;padding:13px}
  .closeBtn{width:auto;}
  .xPostBtn{width:auto;}
}
</style>
</head>

<body>
<div class="app">
  <div class="mail" id="mailBox">
    <div class="header">春野鏡子殺人事件　報告メール</div>
    <div class="row"><div class="label">To</div><div>N.F@koreha.fiction.da</div></div>
    <div class="row"><div class="label">Subject</div><div>春野鏡子殺人事件　報告メール</div></div>
    <textarea id="answer" placeholder="ここに報告内容を入力してください" oninput="checkInput()"></textarea>
    <div class="footer"><button id="sendButton" onclick="sendMail()" disabled>送信</button></div>
  </div>

  <div id="status" class="status">送信中...</div>
  <div id="notification" class="notification" onclick="openReply()">
    📩 新着メール 1件<br><strong>From: N.F@koreha.fiction.da</strong>
  </div>
</div>

<div id="overlay" class="overlay" onclick="closeReply()"></div>

<div id="reply" class="reply">
  <button class="closeBtn" onclick="closeReply()">×</button>
  <div class="reply-title">From: N.F@koreha.fiction.da<br>Subject: RE: 春野鏡子殺人事件　報告メール</div>
  <div id="replyText"></div>
  <button id="xPostButton" class="xPostBtn" onclick="postToX()">Xで報告する</button>
</div>

<footer>
  本作品はフィクションです。実際の地名・団体・人物とは一切関係ございません。<br>
  X: @r4lu3m8l
</footer>

<script>
const answerBox = document.getElementById("answer");
const sendButton = document.getElementById("sendButton");

function checkInput(){ sendButton.disabled = answerBox.value.trim() === ""; }

let replyMessage="", typingTimer=null, canPostToX=false;

const correctWords = ["bread","BREAD","パン"];
const mitaWords = ["三田駅","みたえき","mitaeki"];
const shunWords = ["春野鏡子"];
const nfWords = ["N.F"];
const hintWords = ["わからない","ヒント"];

function sendMail(){
  const input = answerBox.value.trim();
  if(!input) return;

  const mailBox=document.getElementById("mailBox");
  const button=document.getElementById("sendButton");
  const status=document.getElementById("status");
  const notification=document.getElementById("notification");

  button.disabled=true;
  button.textContent="送信中...";
  mailBox.classList.add("sending");
  notification.style.display="none";
  status.style.display="block";
  status.textContent="送信中...";

  const hasCorrect = correctWords.some(w=>input.includes(w));
  const hasMita = mitaWords.some(w=>input.includes(w));
  const hasShun = shunWords.some(w=>input.includes(w));
  const hasNF = nfWords.some(w=>input.includes(w));
  const hasHint = hintWords.some(w=>input.includes(w));

  setTimeout(()=>{button.textContent="✓ 送信済み"; status.textContent="送信済み";},1200);

  setTimeout(()=>{
    status.style.display="none";
    notification.style.display="block";

    // 判定順で返信
    if(hasCorrect){
      replyMessage="春野鏡子殺人事件についての報告を受領した。<br>…そういえばパン屋のチラシが鞄の中に残っていた。<br>何か関連しているのだろうか…<br>パン屋に向ってみることとする。<br>今回も見事な推理だ。また頼むよ。";
      canPostToX=true;
    }
    else if(hasMita && hasShun){
      replyMessage="あの時の君の推察は見事だった。<br>こんなことになるとは…君が見つけてくれてよかった<br>";
      canPostToX=false;
    }
    else if(hasMita){
      replyMessage="君の推察は見事だった。<br>しかしこんなことになってしまうとは…。";
      canPostToX=false;
    }
    else if(hasShun){
      replyMessage="春野鏡子…<br>私が早く見つけられていれば…";
      canPostToX=false;
    }
    else if(hasNF){
      replyMessage="私のことが知りたいのか？<br><br>…その辺にいるしがない探偵だ。<br>語れる過去も無い。";
      canPostToX=false;
    }
    else if(hasHint){
      replyMessage="同じ色だから、消えてしまったのではないだろうか…？";
      canPostToX=false;
    } else {
      replyMessage="春野鏡子殺人事件についての報告を受領した。<br>なるほど…情報が絞れない。<br>申し訳ないがもう一度確認してもらえないだろうか。";
      canPostToX=false;
    }

  },2800);
}

function openReply(){
  const notification=document.getElementById("notification");
  const reply=document.getElementById("reply");
  const replyText=document.getElementById("replyText");
  const xPostButton=document.getElementById("xPostButton");

  notification.style.display="none";
  document.getElementById("overlay").style.display="block";
  reply.style.display="block";
  replyText.innerHTML="";
  xPostButton.style.display="none";

  let i=0;
  if(typingTimer) clearInterval(typingTimer);

  typingTimer=setInterval(()=>{
    replyText.innerHTML=replyMessage.slice(0,i);
    i++;
    if(i>replyMessage.length){
      clearInterval(typingTimer);
      if(canPostToX) setTimeout(()=>{xPostButton.style.display="block";},400);
    }
  },25);
}

function closeReply(){
  document.getElementById("reply").style.display="none";
  document.getElementById("overlay").style.display="none";
  document.getElementById("notification").style.display="none";
  document.getElementById("mailBox").classList.remove("sending");
  sendButton.textContent="送信";
  document.getElementById("xPostButton").style.display="none";
  checkInput();
  answerBox.focus();
}

function postToX() {
  const originalTweetUrl = "https://twitter.com/元アカウント/status/1234567890"; // 引用したい元ツイートURL
  const postText =
    "【File002：おりたたみ探偵事務所　春野鏡子殺人事件】\n" +
    "春野鏡子殺人事件の報告を完了。\n" +
    "N.Fに報告した\n" +
    "#おりたたみ探偵事務所 #謎解き";

  const url =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(postText) +
    "&url=" + encodeURIComponent(originalTweetUrl); // ここで元ツイートを引用

  window.open(url, "_blank");
}
</script>
</body>
</html>
